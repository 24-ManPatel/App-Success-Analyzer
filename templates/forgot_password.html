{% extends "base.html" %}
{% block title %}Forgot Password — App Success Analyzer{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">
            <div class="app-name">App Success Analyzer</div>
            <div class="page-label">Reset Password</div>
            <div class="subtitle">Enter your email to receive a recovery code</div>
        </div>

        {% if error %}
        <div class="auth-error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" name="email" id="email" placeholder="you@example.com" required>
            </div>
            <button type="submit" class="btn-primary full" style="margin-top:0.5rem;">Send Recovery Code</button>
        </form>

        <div class="auth-footer">
            Remember your password? <a href="/login">Back to login</a>
        </div>
    </div>
</div>
{% endblock %}
