<!-- Login page template - Create the user login form with email/username and password fields here -->
<!-- This template should extend base.html and include form validation and error handling -->
{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div
    class="flex items-center justify-center min-h-[calc(100vh-4rem)] px-4 py-12 bg-gradient-to-br from-blue-50 via-indigo-50 to-purple-50">
    <div class="w-full max-w-md transform transition-all hover:scale-[1.01] duration-300">
        <div class="bg-white/90 backdrop-blur-sm rounded-2xl shadow-xl p-8 border border-white/20">
            <div class="text-center mb-8">
                <div
                    class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-blue-100 mb-4 shadow-inner">
                    <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1">
                        </path>
                    </svg>
                </div>
                <h2 class="text-3xl font-extrabold text-gray-800 tracking-tight">Welcome Back</h2>
                <p class="text-gray-500 mt-2 font-medium">Sign in to your account to continue</p>
            </div>

            {% if error %}
            <div
                class="mb-6 animate-pulse p-4 bg-red-50/80 backdrop-blur border border-red-200 rounded-xl flex items-center gap-3">
                <svg class="w-5 h-5 text-red-500 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <p class="text-red-700 text-sm font-semibold">{{ error }}</p>
            </div>
            {% endif %}

            <form method="POST" class="space-y-6">
                <div class="space-y-1 group">
                    <label for="email"
                        class="block text-sm font-semibold text-gray-700 transition-colors group-focus-within:text-blue-600">Email
                        Address</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-gray-400 group-focus-within:text-blue-500 transition-colors"
                                fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207" />
                            </svg>
                        </div>
                        <input type="email" name="email" id="email" placeholder="you@example.com" required
                            class="block w-full pl-10 px-4 py-3 bg-gray-50/50 border border-gray-200 rounded-xl focus:ring-4 focus:ring-blue-500/20 focus:border-blue-500 focus:bg-white outline-none transition-all text-gray-900 placeholder-gray-400 shadow-sm">
                    </div>
                </div>

                <div class="space-y-1 group">
                    <label for="password"
                        class="block text-sm font-semibold text-gray-700 transition-colors group-focus-within:text-blue-600">Password</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-gray-400 group-focus-within:text-blue-500 transition-colors"
                                fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                            </svg>
                        </div>
                        <input type="password" name="password" id="password" placeholder="Enter your password" required
                            class="block w-full pl-10 px-4 py-3 bg-gray-50/50 border border-gray-200 rounded-xl focus:ring-4 focus:ring-blue-500/20 focus:border-blue-500 focus:bg-white outline-none transition-all text-gray-900 placeholder-gray-400 shadow-sm">
                    </div>
                </div>

                <button type="submit"
                    class="w-full relative overflow-hidden group bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-bold py-3.5 px-4 rounded-xl transition-all duration-300 shadow-lg hover:shadow-xl focus:outline-none focus:ring-4 focus:ring-blue-500/30 transform active:scale-95">
                    <span class="relative z-10 flex items-center justify-center gap-2">
                        Sign In
                        <svg class="w-5 h-5 group-hover:translate-x-1 transition-transform" fill="none"
                            stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                        </svg>
                    </span>
                </button>
            </form>

            <div class="mt-8 pt-6 border-t border-gray-100 text-center">
                <p class="text-gray-500 mt-2 font-medium text-sm">
                    Don't have an account?
                    <a href="/register"
                        class="text-indigo-600 hover:text-indigo-800 font-bold transition-colors ml-1 hover:underline decoration-2 underline-offset-4">Register
                        here</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
